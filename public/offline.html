<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>オフライン — CareerTrack</title>
    <style>
      body {
        margin: 0;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #111111;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
        padding: 24px;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #f5f5f5;
        }
      }
      main {
        max-width: 360px;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 8px;
      }
      p {
        font-size: 0.9rem;
        opacity: 0.7;
        line-height: 1.6;
      }
      button {
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid currentColor;
        background: transparent;
        color: inherit;
        font-size: 0.85rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>オフラインです</h1>
      <p>インターネット接続が確認できません。接続を確認してから再読み込みしてください。</p>
      <button onclick="location.reload()">再読み込み</button>
    </main>
  </body>
</html>
