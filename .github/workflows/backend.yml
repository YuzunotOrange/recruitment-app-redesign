name: Backend CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Check FastAPI backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python compile check
        run: python -m compileall app alembic tests

      - name: Run Alembic migration check
        run: alembic upgrade head
        env:
          DATABASE_URL: sqlite:///./ci.db

      - name: Run tests if present
        shell: bash
        run: |
          if [ -d tests ] || find . -maxdepth 3 \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            python -m pip install pytest
            python -m pytest
          else
            echo "No backend tests found; skipping pytest."
          fi

      - name: Start FastAPI server
        shell: bash
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

      - name: Check health endpoint
        shell: bash
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          cat uvicorn.log
          exit 1

      - name: Stop FastAPI server
        if: always()
        shell: bash
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi
